<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tanii Translator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      padding: 28px 40px;
      color: white;
    }
    header h1 {
      font-size: 1.7rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    header p {
      font-size: 0.85rem;
      color: #94a3b8;
      margin-top: 4px;
    }
    .header-inner {
      max-width: 860px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo-dot {
      width: 10px; height: 10px;
      background: #e94560;
      border-radius: 50%;
      display: inline-block;
      margin-right: 8px;
      vertical-align: middle;
    }
    #status-badge {
      font-size: 0.72rem;
      padding: 4px 10px;
      border-radius: 20px;
      background: rgba(255,255,255,0.08);
      color: #94a3b8;
      border: 1px solid rgba(255,255,255,0.1);
    }
    #status-badge.model-on { color: #4ade80; border-color: #4ade8040; }

    /* ── Main card ── */
    main {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 36px 16px;
    }
    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 860px;
      overflow: hidden;
    }

    /* ── Direction bar ── */
    .direction-bar {
      display: flex;
      align-items: center;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      padding: 14px 20px;
      gap: 12px;
    }
    .lang-label {
      flex: 1;
      text-align: center;
      font-size: 0.9rem;
      font-weight: 600;
      color: #1e293b;
      padding: 8px 16px;
      border-radius: 8px;
      transition: background 0.2s;
    }
    .lang-label.active {
      background: #1a1a2e;
      color: white;
    }
    .swap-btn {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 50%;
      width: 36px; height: 36px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      color: #64748b;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .swap-btn:hover { background: #f1f5f9; border-color: #cbd5e1; color: #1e293b; }

    /* ── Translation panels ── */
    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }
    .panel {
      padding: 20px;
      position: relative;
    }
    .panel:first-child {
      border-right: 1px solid #e2e8f0;
    }
    .panel-lang {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #94a3b8;
      margin-bottom: 10px;
    }
    textarea {
      width: 100%;
      height: 180px;
      border: none;
      outline: none;
      resize: none;
      font-size: 1.05rem;
      color: #1e293b;
      line-height: 1.6;
      background: transparent;
      font-family: inherit;
    }
    textarea::placeholder { color: #cbd5e1; }

    .output-text {
      min-height: 180px;
      font-size: 1.05rem;
      color: #1e293b;
      line-height: 1.6;
    }
    .output-text.placeholder { color: #cbd5e1; font-style: italic; }
    .output-text.loading { color: #94a3b8; }

    /* ── Bottom bar ── */
    .bottom-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-top: 1px solid #e2e8f0;
      background: #f8fafc;
    }
    .method-badge {
      font-size: 0.72rem;
      padding: 3px 9px;
      border-radius: 20px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .method-badge.visible { opacity: 1; }
    .method-badge.ml         { background: #ede9fe; color: #7c3aed; }
    .method-badge.dictionary { background: #e0f2fe; color: #0369a1; }

    .translate-btn {
      background: #0f3460;
      color: white;
      border: none;
      padding: 10px 28px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.2px;
    }
    .translate-btn:hover   { background: #1a4a80; }
    .translate-btn:active  { transform: scale(0.97); }
    .translate-btn:disabled { background: #94a3b8; cursor: not-allowed; }

    /* ── Error ── */
    .error-text { color: #ef4444; font-style: italic; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .panels { grid-template-columns: 1fr; }
      .panel:first-child { border-right: none; border-bottom: 1px solid #e2e8f0; }
      header { padding: 20px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <h1><span class="logo-dot"></span>Tanii Translator</h1>
      <p>Apatani ↔ English — Powered by dictionary lookup &amp; ML</p>
    </div>
    <div id="status-badge">checking...</div>
  </div>
</header>

<main>
  <div class="card">

    <!-- Direction toggle -->
    <div class="direction-bar">
      <div class="lang-label active" id="label-source">English</div>
      <button class="swap-btn" id="swap-btn" title="Swap languages">⇄</button>
      <div class="lang-label" id="label-target">Apatani</div>
    </div>

    <!-- Input / Output panels -->
    <div class="panels">
      <div class="panel">
        <div class="panel-lang" id="source-lang-label">English</div>
        <textarea id="input-text" placeholder="Type something to translate…" autofocus></textarea>
      </div>
      <div class="panel">
        <div class="panel-lang" id="target-lang-label">Apatani</div>
        <div class="output-text placeholder" id="output-text">Translation will appear here</div>
      </div>
    </div>

    <!-- Bottom bar -->
    <div class="bottom-bar">
      <span class="method-badge" id="method-badge">—</span>
      <button class="translate-btn" id="translate-btn">Translate</button>
    </div>

  </div>
</main>

<script>
  const inputEl    = document.getElementById('input-text');
  const outputEl   = document.getElementById('output-text');
  const translateBtn = document.getElementById('translate-btn');
  const swapBtn    = document.getElementById('swap-btn');
  const methodBadge = document.getElementById('method-badge');
  const statusBadge = document.getElementById('status-badge');
  const labelSource = document.getElementById('label-source');
  const labelTarget = document.getElementById('label-target');
  const sourceLangLabel = document.getElementById('source-lang-label');
  const targetLangLabel = document.getElementById('target-lang-label');

  let direction = 'en_to_ap';

  // ── Check model status on load ──
  fetch('/health')
    .then(r => r.json())
    .then(data => {
      statusBadge.textContent = data.mode;
      if (data.model_loaded) statusBadge.classList.add('model-on');
    })
    .catch(() => { statusBadge.textContent = 'offline'; });

  // ── Swap languages ──
  swapBtn.addEventListener('click', () => {
    direction = direction === 'en_to_ap' ? 'ap_to_en' : 'en_to_ap';

    const isEnToAp = direction === 'en_to_ap';
    labelSource.textContent = isEnToAp ? 'English' : 'Apatani';
    labelTarget.textContent = isEnToAp ? 'Apatani' : 'English';
    sourceLangLabel.textContent = isEnToAp ? 'English' : 'Apatani';
    targetLangLabel.textContent = isEnToAp ? 'Apatani' : 'English';

    labelSource.classList.add('active');
    labelTarget.classList.remove('active');

    // Swap input/output text
    const prev = outputEl.textContent;
    inputEl.value = prev === 'Translation will appear here' ? '' : prev;
    setOutput('Translation will appear here', true);
    methodBadge.classList.remove('visible');
    inputEl.focus();
  });

  // ── Translate ──
  async function translate() {
    const text = inputEl.value.trim();
    if (!text) return;

    translateBtn.disabled = true;
    setOutput('Translating…', false, true);
    methodBadge.classList.remove('visible');

    try {
      const res = await fetch('/translate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, direction })
      });
      const data = await res.json();

      if (data.error) {
        setOutput(data.error, false, false, true);
      } else {
        setOutput(data.result);
        showMethod(data.method);
      }
    } catch {
      setOutput('Could not reach server.', false, false, true);
    } finally {
      translateBtn.disabled = false;
    }
  }

  function setOutput(text, isPlaceholder = false, isLoading = false, isError = false) {
    outputEl.textContent = text;
    outputEl.className = 'output-text';
    if (isPlaceholder) outputEl.classList.add('placeholder');
    if (isLoading)     outputEl.classList.add('loading');
    if (isError)       outputEl.classList.add('error-text');
  }

  function showMethod(method) {
    methodBadge.textContent = method === 'ml' ? '✦ ML model' : '✦ Dictionary';
    methodBadge.className = `method-badge visible ${method}`;
  }

  // Button click
  translateBtn.addEventListener('click', translate);

  // Ctrl/Cmd + Enter to translate
  inputEl.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') translate();
  });
</script>

</body>
</html>
